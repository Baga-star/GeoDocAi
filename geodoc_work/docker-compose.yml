services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      - APP_PORT=8001

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
